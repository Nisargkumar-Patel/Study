version: '3.8'

services:
  server:
    build: ./server
    container_name: music-session-server
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - CORS_ORIGIN=http://localhost:3000
    volumes:
      - audio-data:/app/uploads
      - temp-data:/app/temp
    networks:
      - music-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build:
      context: ./client
      args:
        - VITE_SERVER_URL=
    container_name: music-session-client
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - music-net
    restart: unless-stopped

volumes:
  audio-data:
  temp-data:

networks:
  music-net:
    driver: bridge
